<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Lumé Beauty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-page="shop">
  <div id="site-header"></div>

  <div class="container">
    <div class="crumb"><a href="index.html">Home</a> / <span id="crumb-cat">Shop All</span></div>
    <div class="shop-head">
      <h1 id="shop-title" style="font-size:clamp(30px,5vw,46px)">Shop All</h1>
      <p class="muted" id="shop-sub">Clean makeup, skincare and accessories — all in one place.</p>
    </div>

    <div class="toolbar">
      <div class="chips" id="chips"></div>
      <div class="tools-right">
        <input class="input" id="search" type="search" placeholder="Search products…" />
        <select class="input" id="sort">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: low to high</option>
          <option value="price-desc">Price: high to low</option>
          <option value="rating">Top rated</option>
        </select>
      </div>
    </div>

    <div class="product-grid" id="shop-grid"></div>
    <div id="shop-empty" hidden class="empty"><div class="mono">lumé</div><h2>Nothing here yet</h2><p class="muted">Try a different category or search.</p></div>
  </div>

  <div style="height:40px"></div>
  <div id="site-footer"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/art.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/shop.js"></script>
</body>
</html>
